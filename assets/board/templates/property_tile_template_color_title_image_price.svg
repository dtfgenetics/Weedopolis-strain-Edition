<svg xmlns="http://www.w3.org/2000/svg" width="500" height="750" viewBox="0 0 500 750">
  <title>Weedopolis Property Tile Template</title>
  <defs>
    <style>
      .tile{fill:#fff8e5;stroke:#173f2c;stroke-width:8;}
      .bar{fill:#9b6b2f;stroke:#173f2c;stroke-width:6;}
      .rule{stroke:#173f2c;stroke-width:5;opacity:.75;}
      .title{font-family:Georgia,serif;font-size:46px;font-weight:700;fill:#173f2c;text-anchor:middle;letter-spacing:1px;}
      .label{font-family:Arial,sans-serif;font-size:22px;font-weight:700;fill:#7c6a34;text-anchor:middle;letter-spacing:1px;}
      .price{font-family:Arial Black,Arial,sans-serif;font-size:42px;font-weight:900;fill:#173f2c;text-anchor:middle;letter-spacing:1px;}
      .sub{font-family:Arial,sans-serif;font-size:24px;font-weight:800;fill:#173f2c;text-anchor:middle;letter-spacing:2px;}
      .imageBox{fill:#f4ead1;stroke:#173f2c;stroke-width:5;stroke-dasharray:18 14;}
    </style>
  </defs>
  <rect class="tile" x="4" y="4" width="492" height="742" rx="10"/>
  <rect class="bar" x="4" y="4" width="492" height="86" rx="8"/>
  <line class="rule" x1="4" y1="90" x2="496" y2="90"/>
  <text class="title" x="250" y="150">TITLE</text>
  <rect class="imageBox" x="80" y="190" width="340" height="330" rx="26"/>
  <text class="label" x="250" y="355">IMAGE / ICON</text>
  <line class="rule" x1="40" y1="560" x2="460" y2="560"/>
  <text class="price" x="250" y="640">000</text>
  <text class="sub" x="250" y="690">BUD BUCKS</text>
</svg>
